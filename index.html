<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Visor Mina 3D</title>
  <meta name="description" content="Visor de modelos 3D para obras de la mina" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #0d1117;
      --panel:     #111827;
      --border:    #1e2d3d;
      --accent:    #00c2ff;
      --accent2:   #0077aa;
      --text:      #c9d1d9;
      --muted:     #4a5568;
      --danger:    #f87171;
      --success:   #34d399;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Barlow', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── TOPBAR ── */
    #topbar {
      height: 48px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 20;
    }

    #topbar .logo {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    #topbar .logo span { color: var(--muted); }

    #topbar .sep { flex: 1; }

    #zone-label {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    #topbar .top-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    #topbar .top-btn:hover { border-color: var(--accent); background: #0a2030; }
    #topbar .top-btn svg { width: 15px; height: 15px; }

    #btn-menu-toggle { display: none; } /* shown on mobile */

    /* ── MAIN LAYOUT ── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 260px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: transform 0.25s ease;
      z-index: 15;
    }

    #sidebar.hidden {
      transform: translateX(-100%);
      position: absolute;
      top: 0; left: 0; bottom: 0;
    }

    .sidebar-section {
      padding: 10px 12px 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    /* Zone selector */
    #zone-list {
      overflow-y: auto;
      max-height: 160px;
      flex-shrink: 0;
    }

    .zone-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid #151f2b;
      transition: background 0.12s;
    }
    .zone-item:hover { background: #0a1520; }
    .zone-item.active {
      background: #0a2030;
      border-left: 2px solid var(--accent);
      padding-left: 12px;
    }

    .zone-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Model list */
    #model-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .model-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      font-size: 12px;
      border-bottom: 1px solid #0f1a24;
      cursor: pointer;
      transition: background 0.12s;
    }
    .model-item:hover { background: #0a1520; }
    .model-item.loading { opacity: 0.5; }
    .model-item.error { color: var(--danger); }

    .model-checkbox {
      width: 14px; height: 14px;
      border: 1px solid var(--muted);
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.12s, background 0.12s;
    }
    .model-item.visible .model-checkbox {
      border-color: var(--accent);
      background: var(--accent2);
    }
    .model-item.visible .model-checkbox::after {
      content: '';
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 2px;
    }

    .model-color-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .model-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: var(--mono);
      font-size: 11px;
    }

    .model-status {
      font-size: 9px;
      font-family: var(--mono);
      color: var(--muted);
    }

    .model-status.ok { color: var(--success); }
    .model-status.err { color: var(--danger); }

    /* mini spinner */
    .mini-spin {
      width: 10px; height: 10px;
      border: 1.5px solid var(--muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* Sidebar bottom controls */
    #sidebar-controls {
      border-top: 1px solid var(--border);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ctrl-row {
      display: flex;
      gap: 6px;
    }

    .ctrl-btn {
      flex: 1;
      background: #0f1e2d;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 8px;
      font-size: 11px;
      font-family: var(--sans);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: border-color 0.12s, background 0.12s;
    }
    .ctrl-btn:hover { border-color: var(--accent); background: #0a2030; }
    .ctrl-btn.active { border-color: var(--accent); background: #0a2030; color: var(--accent); }
    .ctrl-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── OPACITY SLIDER ── */
    .model-opacity-row {
      display: none;
      padding: 2px 14px 6px 36px;
      align-items: center;
      gap: 8px;
    }
    .model-item.visible + .model-opacity-row,
    .model-opacity-row.show { display: flex; }
    .opacity-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    .opacity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    .opacity-val {
      font-size: 9px;
      color: var(--muted);
      font-family: var(--mono);
      width: 24px;
      text-align: right;
    }


    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }

    #canvas-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── OVERLAYS ── */
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(13,17,23,0.85);
      gap: 14px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #loading-overlay.hidden { display: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-text {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
    }

    #loading-sub {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* HUD */
    #hud {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      pointer-events: none;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    /* Stats badge */
    #stats-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(17,24,39,0.75);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      pointer-events: none;
      line-height: 1.6;
      backdrop-filter: blur(4px);
    }

    #stats-badge span { color: var(--accent); }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      #btn-menu-toggle { display: flex; }
      #sidebar {
        width: 80vw;
        max-width: 280px;
        position: absolute;
        top: 0; left: 0; bottom: 0;
        box-shadow: 4px 0 20px rgba(0,0,0,0.5);
        transform: translateX(-110%);
      }
      #sidebar.open { transform: translateX(0); }
      .zone-item { padding: 11px 14px; font-size: 14px; }
      .model-item { padding: 10px 14px; font-size: 13px; }
      .model-name { font-size: 12px; }
      .ctrl-btn { padding: 10px 8px; font-size: 12px; }
      #sidebar-controls { padding: 12px; gap: 8px; }
      .ctrl-row { gap: 8px; }
    }

    /* ── TOUCH DEVICE (smartphone/tablet detected via JS) ── */
    body.is-touch #zone-list { max-height: 110px; }
    body.is-touch #model-list { font-size: 12px; }
    body.is-touch .zone-item { padding: 7px 12px; font-size: 12px; }
    body.is-touch .model-item { padding: 6px 12px; font-size: 11px; }
    body.is-touch .model-name { font-size: 10px; }
    body.is-touch .sidebar-section { padding: 7px 12px 4px; font-size: 9px; }
    body.is-touch .ctrl-btn { padding: 7px 6px; font-size: 10px; }
    body.is-touch #sidebar-controls { padding: 8px; gap: 5px; }
    body.is-touch .ctrl-row { gap: 5px; }

    /* ── MODEL LABELS OVERLAY ── */
    #labels-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .model-label {
      position: absolute;
      transform: translate(-50%, -50%);
      background: rgba(10, 16, 23, 0.78);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      white-space: nowrap;
      pointer-events: none;
      backdrop-filter: blur(3px);
      letter-spacing: 0.04em;
      line-height: 1.5;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <button class="top-btn" id="btn-menu-toggle" title="Menú">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <div class="logo">VISOR<span>·</span>MINA <span>3D</span></div>
  <div class="sep"></div>
  <div id="zone-label">—</div>
  <button class="top-btn" id="btn-fullscreen" title="Pantalla completa">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
    </svg>
  </button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-section">Zonas</div>
    <div id="zone-list"></div>

    <div class="sidebar-section">Modelos en escena</div>
    <div id="model-list"></div>

    <div id="sidebar-controls">
      <!-- Fila 1: Etiquetas + Medidor -->
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-labels">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
          Etiquetas
        </button>
        <button class="ctrl-btn" id="btn-measure">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 12h20M2 12l4-4M2 12l4 4M22 12l-4-4M22 12l-4 4"/>
          </svg>
          Medidor
        </button>
      </div>

      <!-- Fila 3: Perspectiva / Ortográfica / Restablecer -->
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-perspective" title="Perspectiva">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 20L7 4M17 4l4 16M7 4h10M3 20h18"/>
          </svg>
          Persp.
        </button>
        <button class="ctrl-btn" id="btn-ortho" title="Ortográfica">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="5" width="18" height="14" rx="1"/>
            <line x1="3" y1="5" x2="3" y2="19"/><line x1="21" y1="5" x2="21" y2="19"/>
          </svg>
          Ortog.
        </button>
        <button class="ctrl-btn" id="btn-reset" title="Restablecer vista">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
          </svg>
          Reset
        </button>
      </div>

      <!-- Fila 4: Mostrar / Ocultar -->
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-show-all">Mostrar todo</button>
        <button class="ctrl-btn" id="btn-hide-all">Ocultar todo</button>
      </div>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-container">
    <div id="loading-overlay">
      <div class="spinner"></div>
      <div id="loading-text">Inicializando...</div>
      <div id="loading-sub"></div>
    </div>

    <div id="stats-badge">
      modelos: <span id="stat-models">0</span> &nbsp;|&nbsp;
      triángulos: <span id="stat-tris">0</span>
    </div>

    <div id="hud">Arrastra · Pellizca para zoom · Dos dedos para mover</div>
    <div id="labels-overlay"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  'use strict';

  /* ═══════════════════════════════════════════════
     PALETTE — one color per model, cycling
  ═══════════════════════════════════════════════ */
  const PALETTE = [
    0x4a9eca, 0xf4a261, 0x2ec4b6, 0xe9c46a,
    0x9b5de5, 0xf72585, 0x06d6a0, 0xffd166,
    0x118ab2, 0xef476f, 0x26c485, 0xff6b6b,
    0x48cae4, 0xfb8500, 0x80ffdb, 0xffb703,
    0xc77dff, 0xff4d6d, 0x52b788, 0xffc8a2,
    0x0096c7, 0xd62828, 0x57cc99, 0xe76f51,
  ];
  let paletteIdx = 0;
  function nextColor() { return PALETTE[paletteIdx++ % PALETTE.length]; }

  /* ═══════════════════════════════════════════════
     DOM refs
  ═══════════════════════════════════════════════ */
  const container    = document.getElementById('canvas-container');
  const zoneListEl   = document.getElementById('zone-list');
  const modelListEl  = document.getElementById('model-list');
  const loadingEl    = document.getElementById('loading-overlay');
  const loadingText  = document.getElementById('loading-text');
  const loadingSub   = document.getElementById('loading-sub');
  const statModels   = document.getElementById('stat-models');
  const statTris     = document.getElementById('stat-tris');
  const zoneLabelEl  = document.getElementById('zone-label');
  const labelsOverlay = document.getElementById('labels-overlay');

  /* ═══════════════════════════════════════════════
     THREE SETUP
  ═══════════════════════════════════════════════ */
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x0d1117);
  container.appendChild(renderer.domElement);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100000);
  camera.position.set(500, 300, 800);

  scene.add(new THREE.AmbientLight(0xffffff, 0.45));
  const dir1 = new THREE.DirectionalLight(0xffffff, 0.85);
  dir1.position.set(1, 2, 3); scene.add(dir1);
  const dir2 = new THREE.DirectionalLight(0x88ccff, 0.35);
  dir2.position.set(-2, -1, -2); scene.add(dir2);

  // Grid helper (subtle)
  const grid = new THREE.GridHelper(5000, 50, 0x1e2d3d, 0x1e2d3d);
  scene.add(grid);

  function resize() {
    const w = container.clientWidth, h = container.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  /* ═══════════════════════════════════════════════
     STATE
  ═══════════════════════════════════════════════ */
  // zones: [{name, path, models:[{name, path, color, mesh|null, visible, status}]}]
  const zones = [];
  let activeZoneIdx = -1;

  // interaction
  let isDragging = false, prevX = 0, prevY = 0;
  let rotX = 0, rotY = 0, panX = 0, panY = 0, zoom = 1;
  let pinchDist0 = 0, pinchPanX0 = 0, pinchPanY0 = 0;
  let autoRotate = false;
  let wireframeOn = false;
  let labelsOn = false;
  let baseDist = 800; // updated after fit
  let sceneGroup = new THREE.Group(); scene.add(sceneGroup);

  /* ═══════════════════════════════════════════════
     ZONES — read from URL or discover
  ═══════════════════════════════════════════════ */

  /**
   * Expected structure:
   *   ?zones=Zona+norte,Zona+sur   (comma-sep folder names)
   * OR just ?zone=Zona+norte        (single zone — backwards compat)
   * OR no param → load zones.json from root listing all zones
   *
   * Each folder must have models.json:
   *   { "models": ["Drawing7.stl", "Drawing8.stl"] }
   */

  async function init() {
    showLoading('Cargando configuración...');
    const params = new URLSearchParams(location.search);

    let zoneNames = [];

    if (params.has('zones')) {
      zoneNames = params.get('zones').split(',').map(s => s.trim()).filter(Boolean);
    } else if (params.has('zone')) {
      zoneNames = [params.get('zone').trim()];
    } else {
      // Try to load root zones.json: {"zones":["Zona norte","Zona sur"]}
      try {
        const r = await fetch('zones.json');
        if (!r.ok) throw new Error('no zones.json');
        const j = await r.json();
        zoneNames = j.zones || [];
      } catch {
        hideLoading();
        showError('No se encontró zones.json ni parámetros de zona en la URL.');
        return;
      }
    }

    if (!zoneNames.length) {
      hideLoading();
      showError('No hay zonas definidas.');
      return;
    }

    // Load each zone's models.json
    for (const name of zoneNames) {
      const path = name.endsWith('/') ? name : name + '/';
      try {
        const r = await fetch(path + 'models.json');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const j = await r.json();
        const modelNames = j.models || [];
        zones.push({
          name,
          path,
          models: modelNames.map(mn => ({
            name: mn,
            path: path + mn,
            color: nextColor(),
            mesh: null,
            visible: true,
            opacity: 1.0,
            status: 'pending',
          }))
        });
      } catch (e) {
        zones.push({ name, path, models: [], error: e.message });
      }
    }

    renderZoneList();
    // Hide zone section when there's only one zone — no need to show it
    if (zones.length <= 1) {
      document.querySelector('.sidebar-section').style.display = 'none';
      document.getElementById('zone-list').style.display = 'none';
    }
    // Load first zone by default
    if (zones.length > 0) {
      await loadZone(0);
    } else {
      hideLoading();
    }
  }

  /* ═══════════════════════════════════════════════
     ZONE UI
  ═══════════════════════════════════════════════ */
  function renderZoneList() {
    zoneListEl.innerHTML = '';
    zones.forEach((z, i) => {
      const el = document.createElement('div');
      el.className = 'zone-item' + (i === activeZoneIdx ? ' active' : '');
      const dot = document.createElement('div');
      dot.className = 'zone-dot';
      dot.style.background = z.error ? '#f87171' : '#00c2ff';
      el.appendChild(dot);
      const label = document.createElement('span');
      label.textContent = z.name;
      el.appendChild(label);
      el.addEventListener('click', () => loadZone(i));
      zoneListEl.appendChild(el);
    });
  }

  /* ═══════════════════════════════════════════════
     CLEAR SCENE — elimina todos los meshes y
     resetea el estado de los modelos de todas las zonas
  ═══════════════════════════════════════════════ */
  function clearScene() {
    zones.forEach(z => z.models.forEach(m => {
      if (m.mesh) {
        sceneGroup.remove(m.mesh);
        m.mesh.geometry.dispose();
        m.mesh.material.dispose();
        m.mesh = null;
      }
      m.status = 'pending';
      m.triCount = 0;
    }));
    updateStats();
  }

  /* ═══════════════════════════════════════════════
     LOAD ZONE — limpia la escena y carga solo
     los modelos de la zona seleccionada
  ═══════════════════════════════════════════════ */
  async function loadZone(idx) {
    if (idx === activeZoneIdx) return;
    activeZoneIdx = idx;
    const zone = zones[idx];
    zoneLabelEl.textContent = zone.name;

    clearScene();
    renderZoneList();
    renderModelList();

    if (!zone.models.length) { hideLoading(); return; }

    showLoading('Cargando zona: ' + zone.name, '0 / ' + zone.models.length + ' modelos');

    let loaded = 0;
    const promises = zone.models.map(async (model) => {
      model.status = 'loading';
      renderModelList();
      try {
        const buffer = await fetchSTL(model.path);
        const geo = parseSTL(buffer);
        const mat = new THREE.MeshPhongMaterial({
          color: model.color,
          specular: 0x111111,
          shininess: 25,
          side: THREE.DoubleSide,
          wireframe: wireframeOn,
          transparent: true,
          opacity: model.opacity !== undefined ? model.opacity : 1.0,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.visible = model.visible;
        sceneGroup.add(mesh);
        model.mesh = mesh;
        model.status = 'ok';
        model.triCount = geo.attributes.position.count / 3;
      } catch (e) {
        model.status = 'error';
        model.errorMsg = e.message;
      }
      loaded++;
      loadingSub.textContent = loaded + ' / ' + zone.models.length + ' modelos';
      renderModelList();
      updateStats();
    });

    await Promise.all(promises);

    // Reset group rotation before computing bounding box — otherwise Box3 is skewed
    sceneGroup.rotation.set(0, 0, 0);
    sceneGroup.updateMatrixWorld(true);

    panX = 0; panY = 0; rotX = 0; rotY = 0; zoom = 1;
    centerZoneAtOrigin(zone);
    fitCamera();
    hideLoading();
    renderModelList();
  }

  /* ═══════════════════════════════════════════════
     CENTER — mueve todos los meshes de la zona para
     que su bounding box colectivo quede en el origen.
     Debe llamarse con sceneGroup.rotation en cero.
  ═══════════════════════════════════════════════ */
  function centerZoneAtOrigin(zone) {
    const box = new THREE.Box3();
    let hasAny = false;
    zone.models.forEach(m => {
      if (m.mesh) { box.expandByObject(m.mesh); hasAny = true; }
    });
    if (!hasAny) return;

    const center = new THREE.Vector3();
    box.getCenter(center);

    zone.models.forEach(m => {
      if (m.mesh) m.mesh.position.sub(center);
    });
  }

  /* ═══════════════════════════════════════════════
     MODEL LIST UI
  ═══════════════════════════════════════════════ */
  function renderModelList() {
    modelListEl.innerHTML = '';
    const zone = zones[activeZoneIdx];
    if (!zone || !zone.models.length) return;

    zone.models.forEach(model => {
        const el = document.createElement('div');
        el.className = 'model-item' +
          (model.visible ? ' visible' : '') +
          (model.status === 'loading' ? ' loading' : '') +
          (model.status === 'error' ? ' error' : '');

        // Checkbox
        const chk = document.createElement('div');
        chk.className = 'model-checkbox';
        el.appendChild(chk);

        // Color dot
        const dot = document.createElement('div');
        dot.className = 'model-color-dot';
        dot.style.background = '#' + model.color.toString(16).padStart(6, '0');
        el.appendChild(dot);

        // Name
        const name = document.createElement('div');
        name.className = 'model-name';
        name.textContent = model.name.replace('.stl', '');
        el.appendChild(name);

        // Status
        const status = document.createElement('div');
        status.className = 'model-status';
        if (model.status === 'loading') {
          const spin = document.createElement('div');
          spin.className = 'mini-spin';
          el.appendChild(spin);
        } else if (model.status === 'ok') {
          status.className += ' ok';
          status.textContent = '✓';
          el.appendChild(status);
        } else if (model.status === 'error') {
          status.className += ' err';
          status.textContent = '✕';
          status.title = model.errorMsg || '';
          el.appendChild(status);
        }

        // Toggle visibility on click (only on the main row, not slider)
        if (model.mesh) {
          el.addEventListener('click', (e) => {
            if (e.target.classList.contains('opacity-slider')) return;
            model.visible = !model.visible;
            model.mesh.visible = model.visible;
            updateStats();
            renderModelList();
          });
        }

        modelListEl.appendChild(el);

        // Opacity slider row — always rendered below, shown when visible
        if (model.mesh) {
          const opRow = document.createElement('div');
          opRow.className = 'model-opacity-row' + (model.visible ? ' show' : '');
          const slider = document.createElement('input');
          slider.type = 'range';
          slider.className = 'opacity-slider';
          slider.min = 5; slider.max = 100;
          slider.value = Math.round(model.opacity * 100);
          const valLbl = document.createElement('div');
          valLbl.className = 'opacity-val';
          valLbl.textContent = slider.value + '%';
          slider.addEventListener('input', () => {
            model.opacity = slider.value / 100;
            model.mesh.material.opacity = model.opacity;
            valLbl.textContent = slider.value + '%';
          });
          opRow.appendChild(slider);
          opRow.appendChild(valLbl);
          modelListEl.appendChild(opRow);
        }
      });
  }

  function updateStats() {
    let totalMeshes = 0, totalTris = 0;
    zones.forEach(z => z.models.forEach(m => {
      if (m.mesh && m.visible) {
        totalMeshes++;
        totalTris += (m.triCount || 0);
      }
    }));
    statModels.textContent = totalMeshes;
    statTris.textContent = totalTris > 1000
      ? (totalTris / 1000).toFixed(1) + 'k'
      : totalTris;
  }

  /* ═══════════════════════════════════════════════
     STL FETCH + PARSE
  ═══════════════════════════════════════════════ */
  async function fetchSTL(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.arrayBuffer();
  }

  function parseSTL(buffer) {
    const isBinary = (() => {
      if (buffer.byteLength < 84) return false;
      const v = new DataView(buffer);
      const triCount = v.getUint32(80, true);
      return buffer.byteLength === 84 + triCount * 50;
    })();

    const positions = [], normals = [];

    if (isBinary) {
      const view = new DataView(buffer, 84);
      const triCount = new DataView(buffer).getUint32(80, true);
      for (let i = 0; i < triCount; i++) {
        const o = i * 50;
        const nx = view.getFloat32(o, true);
        const ny = view.getFloat32(o + 4, true);
        const nz = view.getFloat32(o + 8, true);
        for (let v = 0; v < 3; v++) {
          const vo = o + 12 + v * 12;
          positions.push(view.getFloat32(vo, true), view.getFloat32(vo + 4, true), view.getFloat32(vo + 8, true));
          normals.push(nx, ny, nz);
        }
      }
    } else {
      const text = new TextDecoder().decode(buffer);
      let nx = 0, ny = 0, nz = 0;
      for (const line of text.split('\n')) {
        const t = line.trim();
        if (t.startsWith('facet normal')) {
          const p = t.split(/\s+/);
          nx = parseFloat(p[2]); ny = parseFloat(p[3]); nz = parseFloat(p[4]);
        } else if (t.startsWith('vertex')) {
          const p = t.split(/\s+/);
          positions.push(parseFloat(p[1]), parseFloat(p[2]), parseFloat(p[3]));
          normals.push(nx, ny, nz);
        }
      }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));

    // Rotate X −90° (CAD convention → Three.js Y-up)
    geo.applyMatrix4(new THREE.Matrix4().makeRotationX(THREE.MathUtils.degToRad(-90)));

    return geo;
  }

  /* ═══════════════════════════════════════════════
     FIT CAMERA to all visible meshes
  ═══════════════════════════════════════════════ */
  function fitCamera() {
    const box = new THREE.Box3();
    let hasAny = false;
    zones.forEach(z => z.models.forEach(m => {
      if (m.mesh) { box.expandByObject(m.mesh); hasAny = true; }
    }));
    if (!hasAny) return;

    const center = new THREE.Vector3();
    const size   = new THREE.Vector3();
    box.getCenter(center);
    box.getSize(size);

    const maxDim = Math.max(size.x, size.y, size.z);
    baseDist = maxDim * 1.8;

    // Adjust grid
    grid.scale.setScalar(maxDim / 2500);
    grid.position.y = box.min.y;

    // Reset pan/rot/zoom
    rotX = 0; rotY = 0; panX = center.x; panY = center.y; zoom = 1;
    camera.position.set(
      center.x + baseDist * 0.6,
      center.y + baseDist * 0.4,
      center.z + baseDist
    );
    camera.lookAt(center);
  }

  /* ═══════════════════════════════════════════════
     LOADING / ERROR UI
  ═══════════════════════════════════════════════ */
  function showLoading(msg, sub) {
    loadingEl.classList.remove('hidden');
    loadingText.textContent = msg || '';
    loadingSub.textContent  = sub  || '';
  }
  function hideLoading() { loadingEl.classList.add('hidden'); }
  function showError(msg) {
    loadingEl.classList.remove('hidden');
    loadingText.textContent = '⚠ ' + msg;
    loadingSub.textContent = '';
    document.querySelector('.spinner').style.display = 'none';
  }

  /* ═══════════════════════════════════════════════
     CONTROLS
  ═══════════════════════════════════════════════ */
  function dist2(a, b) {
    return Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
  }

  container.addEventListener('touchstart', e => {
    e.preventDefault();
    autoRotate = false;
    sidebar.classList.remove('open');
    if (e.touches.length === 1) {
      isDragging = true;
      prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      pinchDist0 = dist2(e.touches[0], e.touches[1]);
      pinchPanX0 = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      pinchPanY0 = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    }
  }, { passive: false });

  container.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      rotY += (e.touches[0].clientX - prevX) * 0.4;
      rotX += (e.touches[0].clientY - prevY) * 0.4;
      prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      const d = dist2(e.touches[0], e.touches[1]);
      zoom *= d / pinchDist0;
      zoom = Math.max(0.05, Math.min(20, zoom));
      pinchDist0 = d;
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      panX -= (cx - pinchPanX0) * (baseDist / zoom) * 0.002;
      panY += (cy - pinchPanY0) * (baseDist / zoom) * 0.002;
      pinchPanX0 = cx; pinchPanY0 = cy;
    }
  }, { passive: false });

  container.addEventListener('touchend', e => {
    if (e.touches.length === 0) isDragging = false;
  });

  container.addEventListener('mousedown', e => {
    isDragging = true; autoRotate = false;
    prevX = e.clientX; prevY = e.clientY;
    sidebar.classList.remove('open');
  });
  container.addEventListener('mousemove', e => {
    if (!isDragging) return;
    rotY += (e.clientX - prevX) * 0.3;
    rotX += (e.clientY - prevY) * 0.3;
    prevX = e.clientX; prevY = e.clientY;
  });
  container.addEventListener('mouseup',    () => { isDragging = false; });
  container.addEventListener('mouseleave', () => { isDragging = false; });
  container.addEventListener('wheel', e => {
    e.preventDefault();
    zoom *= e.deltaY > 0 ? 0.9 : 1.1;
    zoom = Math.max(0.05, Math.min(20, zoom));
    autoRotate = false;
  }, { passive: false });

  /* Buttons */
  document.getElementById('btn-reset').addEventListener('click', () => {
    fitCamera(); autoRotate = false;
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    fitCamera(); autoRotate = false;
  });

  /* ── CAMERA TYPE ── */
  let orthoCamera = null;
  let useOrtho = false;

  function buildOrthoCamera() {
    const w = container.clientWidth, h = container.clientHeight;
    const d = baseDist / zoom;
    const aspect = w / h;
    const size = d * 0.55;
    orthoCamera = new THREE.OrthographicCamera(
      -size * aspect, size * aspect, size, -size, 0.1, 100000
    );
  }

  function getActiveCamera() { return useOrtho ? orthoCamera : camera; }

  document.getElementById('btn-perspective').addEventListener('click', function() {
    if (!useOrtho) return;
    useOrtho = false;
    document.getElementById('btn-perspective').classList.add('active');
    document.getElementById('btn-ortho').classList.remove('active');
  });

  document.getElementById('btn-ortho').addEventListener('click', function() {
    if (useOrtho) return;
    buildOrthoCamera();
    useOrtho = true;
    document.getElementById('btn-ortho').classList.add('active');
    document.getElementById('btn-perspective').classList.remove('active');
  });

  // Start with perspective active
  document.getElementById('btn-perspective').classList.add('active');

  /* ── DISTANCE MEASURE ── */
  let measureOn = false;
  let measurePoints = [];
  let measureLineObj = null;
  let measureLabelEl = null;
  const _raycaster = new THREE.Raycaster();
  const _mouse = new THREE.Vector2();

  function clearMeasure() {
    measurePoints = [];
    if (measureLineObj) { sceneGroup.remove(measureLineObj); measureLineObj = null; }
    if (measureLabelEl) { measureLabelEl.remove(); measureLabelEl = null; }
  }

  function drawMeasureLine(p1, p2) {
    if (measureLineObj) sceneGroup.remove(measureLineObj);
    // Convert world points to sceneGroup local space
    const inv = new THREE.Matrix4().copy(sceneGroup.matrixWorld).invert();
    const lp1 = p1.clone().applyMatrix4(inv);
    const lp2 = p2.clone().applyMatrix4(inv);
    const geo = new THREE.BufferGeometry().setFromPoints([lp1, lp2]);
    const mat = new THREE.LineBasicMaterial({ color: 0xffd166, depthTest: false });
    measureLineObj = new THREE.Line(geo, mat);
    sceneGroup.add(measureLineObj);
  }

  function updateMeasureLabel(p1, p2) {
    const dist = p1.distanceTo(p2).toFixed(2);
    const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
    const ndc = mid.clone().project(getActiveCamera());
    const cw = container.clientWidth, ch = container.clientHeight;
    const x = (ndc.x * 0.5 + 0.5) * cw;
    const y = (-ndc.y * 0.5 + 0.5) * ch;
    if (!measureLabelEl) {
      measureLabelEl = document.createElement('div');
      measureLabelEl.className = 'model-label';
      measureLabelEl.style.color = '#ffd166';
      measureLabelEl.style.borderColor = '#ffd166';
      labelsOverlay.appendChild(measureLabelEl);
    }
    measureLabelEl.textContent = dist + ' u';
    measureLabelEl.style.left = x + 'px';
    measureLabelEl.style.top  = y + 'px';
  }

  function getRaycastPoint(clientX, clientY) {
    const rect = container.getBoundingClientRect();
    _mouse.x = ((clientX - rect.left) / rect.width)  *  2 - 1;
    _mouse.y = ((clientY - rect.top)  / rect.height) * -2 + 1;
    _raycaster.setFromCamera(_mouse, getActiveCamera());
    const meshes = [];
    zones.forEach(z => z.models.forEach(m => { if (m.mesh && m.visible) meshes.push(m.mesh); }));
    const hits = _raycaster.intersectObjects(meshes, true);
    return hits.length ? hits[0].point.clone() : null;
  }

  function registerMeasurePoint(pt) {
    if (!pt) return;
    measurePoints.push(pt);
    if (measurePoints.length === 1) {
      drawMeasureLine(measurePoints[0], measurePoints[0]);
    } else if (measurePoints.length === 2) {
      drawMeasureLine(measurePoints[0], measurePoints[1]);
      updateMeasureLabel(measurePoints[0], measurePoints[1]);
    } else {
      clearMeasure();
      measurePoints.push(pt);
      drawMeasureLine(measurePoints[0], measurePoints[0]);
    }
  }

  // Live line follows cursor after first point (desktop)
  container.addEventListener('mousemove', function(e) {
    if (!measureOn || measurePoints.length !== 1) return;
    const pt = getRaycastPoint(e.clientX, e.clientY);
    if (pt) drawMeasureLine(measurePoints[0], pt);
  });

  // Click to place points (desktop)
  container.addEventListener('click', function(e) {
    if (!measureOn) return;
    const pt = getRaycastPoint(e.clientX, e.clientY);
    registerMeasurePoint(pt);
  });

  // Long press to place points (mobile)
  let _lpTimer = null;
  let _lpMoved = false;
  let _lpOrigin = { x: 0, y: 0 };

  container.addEventListener('touchstart', function(e) {
    if (!measureOn || e.touches.length !== 1) return;
    _lpMoved = false;
    _lpOrigin = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    _lpTimer = setTimeout(() => {
      if (!_lpMoved) {
        const t = e.touches[0];
        const pt = getRaycastPoint(t.clientX, t.clientY);
        registerMeasurePoint(pt);
        // Haptic feedback if available
        if (navigator.vibrate) navigator.vibrate(40);
      }
    }, 500);
  }, { passive: true });

  container.addEventListener('touchmove', function(e) {
    if (!_lpTimer) return;
    const dx = e.touches[0].clientX - _lpOrigin.x;
    const dy = e.touches[0].clientY - _lpOrigin.y;
    if (Math.hypot(dx, dy) > 8) { _lpMoved = true; clearTimeout(_lpTimer); _lpTimer = null; }
  }, { passive: true });

  container.addEventListener('touchend', function() {
    clearTimeout(_lpTimer); _lpTimer = null;
  }, { passive: true });

  document.getElementById('btn-measure').addEventListener('click', function() {
    measureOn = !measureOn;
    this.classList.toggle('active', measureOn);
    if (!measureOn) clearMeasure();
    container.style.cursor = measureOn ? 'crosshair' : '';
  });

  document.getElementById('btn-show-all').addEventListener('click', () => {
    zones.forEach(z => z.models.forEach(m => {
      m.visible = true;
      if (m.mesh) m.mesh.visible = true;
    }));
    updateStats(); renderModelList();
  });

  document.getElementById('btn-hide-all').addEventListener('click', () => {
    zones.forEach(z => z.models.forEach(m => {
      m.visible = false;
      if (m.mesh) m.mesh.visible = false;
    }));
    updateStats(); renderModelList();
  });

  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
  });

  document.getElementById('btn-menu-toggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });

  /* ═══════════════════════════════════════════════
     RENDER LOOP
  ═══════════════════════════════════════════════ */
  /* ═══════════════════════════════════════════════
     LABELS OVERLAY — project 3D centroids to 2D
  ═══════════════════════════════════════════════ */
  const _labelMap = new Map(); // model → <div>

  function updateLabels() {
    // Always update measure label regardless of labelsOn
    if (measureOn && measurePoints.length === 2) {
      updateMeasureLabel(measurePoints[0], measurePoints[1]);
    }

    if (!labelsOn) { 
      // Clear model labels but keep measure label
      _labelMap.forEach(el => el.remove());
      _labelMap.clear();
      return; 
    }

    const zone = zones[activeZoneIdx];
    if (!zone) { _labelMap.forEach(el => el.remove()); _labelMap.clear(); return; }

    const w = container.clientWidth;
    const h = container.clientHeight;
    const _box3 = new THREE.Box3();
    const _center = new THREE.Vector3();

    // Remove labels for models no longer present
    _labelMap.forEach((el, model) => {
      if (!zone.models.includes(model)) { el.remove(); _labelMap.delete(model); }
    });

    zone.models.forEach(model => {
      if (!model.mesh || !model.visible || model.status !== 'ok') {
        if (_labelMap.has(model)) { _labelMap.get(model).remove(); _labelMap.delete(model); }
        return;
      }

      // Get or create label div
      let el = _labelMap.get(model);
      if (!el) {
        el = document.createElement('div');
        el.className = 'model-label';
        el.textContent = model.name.replace(/\.stl$/i, '');
        labelsOverlay.appendChild(el);
        _labelMap.set(model, el);
      }

      // Compute world-space centroid
      _box3.setFromObject(model.mesh);
      _box3.getCenter(_center);

      // Project to NDC then to CSS pixels
      const ndc = _center.clone().project(getActiveCamera());
      const x = (ndc.x * 0.5 + 0.5) * w;
      const y = (-ndc.y * 0.5 + 0.5) * h;

      // Hide if behind camera
      if (ndc.z > 1) { el.style.display = 'none'; return; }
      el.style.display = '';
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
    });
  }

  document.getElementById('btn-labels').addEventListener('click', function() {
    labelsOn = !labelsOn;
    this.classList.toggle('active', labelsOn);
    if (!labelsOn) { labelsOverlay.innerHTML = ''; _labelMap.clear(); }
  });

  function animate() {
    requestAnimationFrame(animate);

    sceneGroup.rotation.x = THREE.MathUtils.degToRad(rotX);
    sceneGroup.rotation.y = THREE.MathUtils.degToRad(rotY);

    const d = baseDist / zoom;
    camera.position.set(panX + d * 0.6, panY + d * 0.4, d);
    camera.lookAt(panX, panY, 0);

    if (useOrtho && orthoCamera) {
      // Sync ortho camera to same position/orientation as perspective
      orthoCamera.position.copy(camera.position);
      orthoCamera.lookAt(panX, panY, 0);
      // Update ortho frustum size based on zoom
      const aspect = container.clientWidth / container.clientHeight;
      const size = d * 0.55;
      orthoCamera.left   = -size * aspect;
      orthoCamera.right  =  size * aspect;
      orthoCamera.top    =  size;
      orthoCamera.bottom = -size;
      orthoCamera.updateProjectionMatrix();
      renderer.render(scene, orthoCamera);
    } else {
      renderer.render(scene, camera);
    }

    updateLabels();
  }
  animate();

  /* ═══════════════════════════════════════════════
     DEVICE DETECTION — compact sidebar on touch
  ═══════════════════════════════════════════════ */
  if (navigator.maxTouchPoints > 0 || window.matchMedia('(pointer: coarse)').matches) {
    document.body.classList.add('is-touch');
  }

  /* ═══════════════════════════════════════════════
     SERVICE WORKER
  ═══════════════════════════════════════════════ */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  /* ═══════════════════════════════════════════════
     START
  ═══════════════════════════════════════════════ */
  init();

})();
</script>
</body>
</html>
