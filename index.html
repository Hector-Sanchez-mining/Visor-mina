<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visor 3D</title>

  <link rel="manifest" href="manifest.json">

  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js";
import { STLLoader } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/STLLoader.js";

const scene = new THREE.Scene();

// --- cámara ---
const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  10000
);

camera.position.set(0, 0, 200);

// --- renderer ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// --- controles ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// --- luces ---
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const light = new THREE.DirectionalLight(0xffffff, 0.6);
light.position.set(1, 1, 1);
scene.add(light);

// =====================================================
// CARGA STL
// =====================================================

const loader = new STLLoader();

loader.load(
  "modelos/ejemplo.stl",

  function (geometry) {

    console.log("STL cargado correctamente");

    // importante: limpiar geometría
    geometry.computeBoundingBox();
    geometry.center();

    const material = new THREE.MeshNormalMaterial();

    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // 🔴 AJUSTE AUTOMÁTICO DE CÁMARA (CRÍTICO)
    const box = new THREE.Box3().setFromObject(mesh);
    const size = box.getSize(new THREE.Vector3()).length();

    camera.position.set(0, 0, size * 1.2);
    camera.lookAt(0, 0, 0);

    controls.update();
  },

  undefined,

  function (error) {
    console.error("Error cargando STL:", error);
  }
);

// =====================================================
// LOOP
// =====================================================

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

animate();

// =====================================================
// RESIZE
// =====================================================

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// =====================================================
// SERVICE WORKER
// =====================================================

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

</script>

</body>
</html>
