<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Visor Mina</title>
  <meta name="description" content="Visor de modelos 3D para obras de la mina" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    #header {
      background: #16213e;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
      z-index: 10;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 500;
      color: #a8d8ea;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    #header span {
      font-size: 11px;
      color: #888;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }

    #canvas-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      gap: 16px;
      z-index: 5;
    }

    #loading p {
      font-size: 14px;
      color: #aaa;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #0f3460;
      border-top-color: #a8d8ea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      gap: 12px;
      padding: 24px;
      text-align: center;
      z-index: 5;
    }

    #error p { font-size: 14px; color: #f09595; }
    #error small { font-size: 12px; color: #666; }

    #controls {
      background: #16213e;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      border-top: 1px solid #0f3460;
      flex-shrink: 0;
      gap: 8px;
    }

    .btn {
      background: #0f3460;
      border: none;
      border-radius: 8px;
      color: #a8d8ea;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn:active { background: #1a5276; }

    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    #info-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6px 12px;
      font-size: 11px;
      color: #555;
      text-align: center;
      pointer-events: none;
      z-index: 4;
    }
  </style>
</head>
<body>

<div id="header">
  <h1 id="model-name">Cargando...</h1>
  <span id="model-size"></span>
</div>

<div id="canvas-container">
  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-msg">Cargando modelo...</p>
  </div>
  <div id="error">
    <p>No se pudo cargar el modelo</p>
    <small id="error-detail"></small>
  </div>
  <div id="info-bar">Arrastra para rotar · Pellizca para zoom · Dos dedos para mover</div>
</div>

<div id="controls">
  <button class="btn" id="btn-reset" title="Restablecer vista">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </svg>
    Restablecer
  </button>

  <button class="btn" id="btn-wireframe" title="Alternar malla">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
    </svg>
    Malla
  </button>

  <button class="btn" id="btn-fullscreen" title="Pantalla completa">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
    </svg>
    Fullscreen
  </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  const params = new URLSearchParams(location.search);
  const modelParam = params.get('m');

  const MODEL_PATH = modelParam
    ? 'modelos/' + modelParam + '.stl'
    : 'modelos/Drawing7.stl';

  const MODEL_DISPLAY = modelParam || 'Drawing7';

  document.getElementById('model-name').textContent = MODEL_DISPLAY;

  const container = document.getElementById('canvas-container');
  const loadingEl = document.getElementById('loading');
  const loadingMsg = document.getElementById('loading-msg');
  const errorEl = document.getElementById('error');

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x1a1a2e);
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 10000);

  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);
  const dir1 = new THREE.DirectionalLight(0xffffff, 0.8);
  dir1.position.set(1, 2, 3);
  scene.add(dir1);
  const dir2 = new THREE.DirectionalLight(0xa8d8ea, 0.4);
  dir2.position.set(-2, -1, -1);
  scene.add(dir2);

  let mesh = null;
  let wireframeOn = false;
  let autoRotate = true;

  function resize() {
    const w = container.clientWidth;
    const h = container.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  function parseSTL(buffer) {
    const isBinary = (function() {
      if (buffer.byteLength < 84) return false;
      const headerView = new DataView(buffer, 0, 84);
      const triCount = headerView.getUint32(80, true);
      return buffer.byteLength === 84 + triCount * 50;
    })();

    const geometry = new THREE.BufferGeometry();
    const positions = [];
    const normals = [];

    if (isBinary) {
      const view = new DataView(buffer, 84);
      const triCount = new DataView(buffer).getUint32(80, true);
      for (let i = 0; i < triCount; i++) {
        const offset = i * 50;
        const nx = view.getFloat32(offset, true);
        const ny = view.getFloat32(offset + 4, true);
        const nz = view.getFloat32(offset + 8, true);
        for (let v = 0; v < 3; v++) {
          const vo = offset + 12 + v * 12;
          positions.push(
            view.getFloat32(vo, true),
            view.getFloat32(vo + 4, true),
            view.getFloat32(vo + 8, true)
          );
          normals.push(nx, ny, nz);
        }
      }
    } else {
      const text = new TextDecoder().decode(buffer);
      const lines = text.split('\n');
      let nx = 0, ny = 0, nz = 0;
      for (const line of lines) {
        const t = line.trim();
        if (t.startsWith('facet normal')) {
          const p = t.split(/\s+/);
          nx = parseFloat(p[2]); ny = parseFloat(p[3]); nz = parseFloat(p[4]);
        } else if (t.startsWith('vertex')) {
          const p = t.split(/\s+/);
          positions.push(parseFloat(p[1]), parseFloat(p[2]), parseFloat(p[3]));
          normals.push(nx, ny, nz);
        }
      }
    }

    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geometry.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
    return geometry;
  }

  function loadModel(url) {
    loadingEl.style.display = 'flex';
    errorEl.style.display = 'none';

    fetch(url)
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const total = r.headers.get('content-length');
        if (total) {
          const mb = (parseInt(total) / 1048576).toFixed(1);
          document.getElementById('model-size').textContent = mb + ' MB';
        }
        loadingMsg.textContent = 'Procesando geometría...';
        return r.arrayBuffer();
      })
      .then(buffer => {
        const geometry = parseSTL(buffer);
        geometry.computeBoundingBox();
        const box = geometry.boundingBox;
        const center = new THREE.Vector3();
        box.getCenter(center);
        geometry.translate(-center.x, -center.y, -center.z);

        const rotMat = new THREE.Matrix4().makeRotationX(THREE.MathUtils.degToRad(-90));
        geometry.applyMatrix4(rotMat);

        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);

        const material = new THREE.MeshPhongMaterial({
          color: 0x4a9eca,
          specular: 0x222222,
          shininess: 30,
          side: THREE.DoubleSide
        });

        if (mesh) scene.remove(mesh);
        mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        const dist = maxDim * 1.8;
        camera.position.set(dist * 0.6, dist * 0.4, dist);
        camera.lookAt(0, 0, 0);

        loadingEl.style.display = 'none';
        autoRotate = true;
      })
      .catch(err => {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'flex';
        document.getElementById('error-detail').textContent = err.message;
      });
  }

  loadModel(MODEL_PATH);

  let isDragging = false;
  let prevX = 0, prevY = 0;
  let rotX = 0, rotY = 0;
  let panX = 0, panY = 0;
  let zoom = 1;

  let pinchDist0 = 0;
  let pinchPanX0 = 0, pinchPanY0 = 0;

  function dist2(t1, t2) {
    return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
  }

  container.addEventListener('touchstart', e => {
    e.preventDefault();
    autoRotate = false;
    if (e.touches.length === 1) {
      isDragging = true;
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      pinchDist0 = dist2(e.touches[0], e.touches[1]);
      pinchPanX0 = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      pinchPanY0 = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    }
  }, { passive: false });

  container.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      const dx = e.touches[0].clientX - prevX;
      const dy = e.touches[0].clientY - prevY;
      rotY -= dx * 0.4;
      rotX -= dy * 0.4;
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      const d = dist2(e.touches[0], e.touches[1]);
      zoom *= d / pinchDist0;
      zoom = Math.max(0.1, Math.min(10, zoom));
      pinchDist0 = d;

      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      panX += (cx - pinchPanX0) * 0.01;
      panY -= (cy - pinchPanY0) * 0.01;
      pinchPanX0 = cx;
      pinchPanY0 = cy;
    }
  }, { passive: false });

  container.addEventListener('touchend', e => {
    if (e.touches.length === 0) isDragging = false;
  });

  container.addEventListener('mousedown', e => {
    isDragging = true;
    autoRotate = false;
    prevX = e.clientX;
    prevY = e.clientY;
  });
  container.addEventListener('mousemove', e => {
    if (!isDragging) return;
    rotY -= (e.clientX - prevX) * 0.3;
    rotX -= (e.clientY - prevY) * 0.3;
    prevX = e.clientX;
    prevY = e.clientY;
  });
  container.addEventListener('mouseup', () => { isDragging = false; });
  container.addEventListener('mouseleave', () => { isDragging = false; });
  container.addEventListener('wheel', e => {
    e.preventDefault();
    zoom *= e.deltaY > 0 ? 0.9 : 1.1;
    zoom = Math.max(0.1, Math.min(10, zoom));
    autoRotate = false;
  }, { passive: false });

  document.getElementById('btn-reset').addEventListener('click', () => {
    rotX = 0; rotY = 0; panX = 0; panY = 0; zoom = 1;
    autoRotate = true;
  });

  document.getElementById('btn-wireframe').addEventListener('click', () => {
    if (!mesh) return;
    wireframeOn = !wireframeOn;
    mesh.material.wireframe = wireframeOn;
    document.getElementById('btn-wireframe').style.background = wireframeOn ? '#1a5276' : '#0f3460';
  });

  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  });

  const pivot = new THREE.Object3D();
  scene.add(pivot);

  function animate() {
    requestAnimationFrame(animate);

    if (autoRotate) rotY -= 0.2;

    if (mesh) {
      mesh.rotation.x = THREE.MathUtils.degToRad(rotX);
      mesh.rotation.y = THREE.MathUtils.degToRad(rotY);

      const box = new THREE.Box3().setFromObject(mesh);
      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z);
      const baseDist = maxDim * 1.8;
      camera.position.set(
        panX + baseDist * 0.6 / zoom,
        panY + baseDist * 0.4 / zoom,
        baseDist / zoom
      );
      camera.lookAt(panX, panY, 0);
    }

    renderer.render(scene, camera);
  }
  animate();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
