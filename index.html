<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Visor Mina 3D</title>
  <meta name="description" content="Visor de modelos 3D para obras de la mina" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #0d1117;
      --panel:     #111827;
      --border:    #1e2d3d;
      --accent:    #00c2ff;
      --accent2:   #0077aa;
      --text:      #c9d1d9;
      --muted:     #4a5568;
      --danger:    #f87171;
      --success:   #34d399;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Barlow', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── TOPBAR ── */
    #topbar {
      height: 48px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 20;
    }

    #topbar .logo {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    #topbar .logo span { color: var(--muted); }

    #topbar .sep { flex: 1; }

    #zone-label {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    #topbar .top-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    #topbar .top-btn:hover { border-color: var(--accent); background: #0a2030; }
    #topbar .top-btn svg { width: 15px; height: 15px; }

    #btn-menu-toggle { display: none; } /* shown on mobile */

    /* ── MAIN LAYOUT ── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 260px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: transform 0.25s ease;
      z-index: 15;
    }

    #sidebar.hidden {
      transform: translateX(-100%);
      position: absolute;
      top: 0; left: 0; bottom: 0;
    }

    .sidebar-section {
      padding: 10px 12px 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    /* Zone selector */
    #zone-list {
      overflow-y: auto;
      max-height: 160px;
      flex-shrink: 0;
    }

    .zone-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid #151f2b;
      transition: background 0.12s;
    }
    .zone-item:hover { background: #0a1520; }
    .zone-item.active {
      background: #0a2030;
      border-left: 2px solid var(--accent);
      padding-left: 12px;
    }

    .zone-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Model list */
    #model-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .model-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      font-size: 12px;
      border-bottom: 1px solid #0f1a24;
      cursor: pointer;
      transition: background 0.12s;
    }
    .model-item:hover { background: #0a1520; }
    .model-item.loading { opacity: 0.5; }
    .model-item.error { color: var(--danger); }

    .model-checkbox {
      width: 14px; height: 14px;
      border: 1px solid var(--muted);
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.12s, background 0.12s;
    }
    .model-item.visible .model-checkbox {
      border-color: var(--accent);
      background: var(--accent2);
    }
    .model-item.visible .model-checkbox::after {
      content: '';
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 2px;
    }

    .model-color-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .model-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: var(--mono);
      font-size: 11px;
    }

    .model-status {
      font-size: 9px;
      font-family: var(--mono);
      color: var(--muted);
    }

    .model-status.ok { color: var(--success); }
    .model-status.err { color: var(--danger); }

    /* mini spinner */
    .mini-spin {
      width: 10px; height: 10px;
      border: 1.5px solid var(--muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* Sidebar bottom controls */
    #sidebar-controls {
      border-top: 1px solid var(--border);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ctrl-row {
      display: flex;
      gap: 6px;
    }

    .ctrl-btn {
      flex: 1;
      background: #0f1e2d;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 8px;
      font-size: 11px;
      font-family: var(--sans);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: border-color 0.12s, background 0.12s;
    }
    .ctrl-btn:hover { border-color: var(--accent); background: #0a2030; }
    .ctrl-btn.active { border-color: var(--accent); background: #0a2030; color: var(--accent); }
    .ctrl-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── OPACITY SLIDER ── */
    .model-opacity-row {
      display: none;
      padding: 2px 14px 6px 36px;
      align-items: center;
      gap: 8px;
    }
    .model-item.visible + .model-opacity-row,
    .model-opacity-row.show { display: flex; }
    .opacity-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    .opacity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    .opacity-val {
      font-size: 9px;
      color: var(--muted);
      font-family: var(--mono);
      width: 24px;
      text-align: right;
    }

    /* ── SPLIT SCREEN ── */
    #canvas-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* In split mode, canvas-container shrinks to fill above the clip bar */
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }

    /* Divider line shown in split mode */
    #split-divider {
      display: none;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      flex-shrink: 0;
      opacity: 0.5;
      pointer-events: none;
    }
    body.split-mode #split-divider { display: block; }

    /* ── CLIPPING BOTTOM BAR ── */
    #clip-panel {
      display: none;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    #clip-panel::-webkit-scrollbar { display: none; }
    #clip-panel.show { display: flex; }

    #clip-panel label {
      font-size: 9px;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: .06em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .clip-sep {
      width: 1px;
      height: 22px;
      background: var(--border);
      flex-shrink: 0;
    }

    #clip-axis-btns {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .clip-axis-btn {
      background: #0f1e2d;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 10px;
      font-family: var(--mono);
      padding: 4px 8px;
      cursor: pointer;
      text-align: center;
      white-space: nowrap;
      transition: border-color .12s, background .12s;
      flex-shrink: 0;
    }
    .clip-axis-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #0a2030;
    }

    /* Slider group: label + slider + value inline */
    .clip-slider-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      min-width: 140px;
    }
    .clip-slider-group label {
      margin: 0;
    }

    #clip-slider, #clip-width-slider {
      -webkit-appearance: none;
      width: 90px;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    #clip-slider::-webkit-slider-thumb,
    #clip-width-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #f4a261;
      cursor: pointer;
    }
    #clip-pos-label, #clip-width-val {
      font-size: 10px;
      color: var(--accent);
      font-family: var(--mono);
      width: 30px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Width group hidden when mode=half */
    #clip-width-group { display: flex; }
    #clip-width-group.hidden { display: none; }
    #canvas-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── OVERLAYS ── */
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(13,17,23,0.85);
      gap: 14px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #loading-overlay.hidden { display: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-text {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
    }

    #loading-sub {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* HUD */
    #hud {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      pointer-events: none;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    /* Stats badge */
    #stats-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(17,24,39,0.75);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      pointer-events: none;
      line-height: 1.6;
      backdrop-filter: blur(4px);
    }

    #stats-badge span { color: var(--accent); }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      #btn-menu-toggle { display: flex; }
      #sidebar {
        width: 80vw;
        max-width: 280px;
        position: absolute;
        top: 0; left: 0; bottom: 0;
        box-shadow: 4px 0 20px rgba(0,0,0,0.5);
        transform: translateX(-110%);
      }
      #sidebar.open { transform: translateX(0); }
      .zone-item { padding: 11px 14px; font-size: 14px; }
      .model-item { padding: 10px 14px; font-size: 13px; }
      .model-name { font-size: 12px; }
      .ctrl-btn { padding: 10px 8px; font-size: 12px; }
      #sidebar-controls { padding: 12px; gap: 8px; }
      .ctrl-row { gap: 8px; }
    }

    /* ── TOUCH DEVICE (smartphone/tablet detected via JS) ── */
    body.is-touch #zone-list { max-height: 110px; }
    body.is-touch #model-list { font-size: 12px; }
    body.is-touch .zone-item { padding: 7px 12px; font-size: 12px; }
    body.is-touch .model-item { padding: 6px 12px; font-size: 11px; }
    body.is-touch .model-name { font-size: 10px; }
    body.is-touch .sidebar-section { padding: 7px 12px 4px; font-size: 9px; }
    body.is-touch .ctrl-btn { padding: 7px 6px; font-size: 10px; }
    body.is-touch #sidebar-controls { padding: 8px; gap: 5px; }
    body.is-touch .ctrl-row { gap: 5px; }

    /* Divider line in the middle of canvas when split-mode is active */
    body.split-mode #canvas-container::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 20%, var(--accent) 80%, transparent 100%);
      opacity: 0.4;
      pointer-events: none;
      z-index: 2;
    }

    /* label-bottom default position */
    #label-bottom { top: calc(50% + 8px); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <button class="top-btn" id="btn-menu-toggle" title="Menú">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <div class="logo">VISOR<span>·</span>MINA <span>3D</span></div>
  <div class="sep"></div>
  <div id="zone-label">—</div>
  <button class="top-btn" id="btn-fullscreen" title="Pantalla completa">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
    </svg>
  </button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-section">Zonas</div>
    <div id="zone-list"></div>

    <div class="sidebar-section">Modelos en escena</div>
    <div id="model-list"></div>

    <div id="sidebar-controls">
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-reset">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
          </svg>
          Restablecer
        </button>
        <button class="ctrl-btn" id="btn-wireframe">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          Malla
        </button>
      </div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-show-all">Mostrar todo</button>
        <button class="ctrl-btn" id="btn-hide-all">Ocultar todo</button>
      </div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-autorotate">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38"/>
          </svg>
          Auto-rotar
        </button>
        <button class="ctrl-btn" id="btn-fit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/>
          </svg>
          Ajustar
        </button>
      </div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-clip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6l9 6-9 6"/>
          </svg>
          Corte
        </button>
      </div>
    </div>
  </div>

  <!-- CANVAS WRAPPER (contains both viewports + clip bar) -->
  <div id="canvas-wrapper">

    <!-- Single canvas that renders two viewports in split mode -->
    <div id="canvas-container">
      <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Inicializando...</div>
        <div id="loading-sub"></div>
      </div>

      <div id="stats-badge">
        modelos: <span id="stat-models">0</span> &nbsp;|&nbsp;
        triángulos: <span id="stat-tris">0</span>
      </div>

      <!-- Label overlays for split mode -->
      <div id="label-top" style="display:none;position:absolute;top:8px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:.1em;pointer-events:none;background:rgba(13,17,23,.6);padding:2px 8px;border-radius:4px;border:1px solid var(--border);">CON CORTE</div>
      <div id="label-bottom" style="display:none;position:absolute;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.1em;pointer-events:none;background:rgba(13,17,23,.6);padding:2px 8px;border-radius:4px;border:1px solid var(--border);">PLANO VISIBLE</div>

      <div id="hud">Arrastra · Pellizca para zoom · Dos dedos para mover</div>
    </div>

    <!-- COMPACT HORIZONTAL CLIP BAR (fixed bottom, shown only when clip active) -->
    <div id="clip-panel">
      <!-- Eje -->
      <label>EJE</label>
      <div id="clip-axis-btns">
        <div class="clip-axis-btn active" data-axis="y">Y</div>
        <div class="clip-axis-btn" data-axis="x">X</div>
        <div class="clip-axis-btn" data-axis="z">Z</div>
      </div>

      <div class="clip-sep"></div>

      <!-- Posición -->
      <div class="clip-slider-group">
        <label>POS</label>
        <input type="range" id="clip-slider" min="0" max="100" value="50">
        <div id="clip-pos-label">50%</div>
      </div>

      <!-- Ancho (solo en modo rebanada) -->
      <div class="clip-sep" id="clip-width-sep"></div>
      <div class="clip-slider-group" id="clip-width-group">
        <label>ANCHO</label>
        <input type="range" id="clip-width-slider" min="1" max="100" value="10">
        <div id="clip-width-val">10%</div>
      </div>
    </div>

  </div><!-- /canvas-wrapper -->
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  'use strict';

  /* ═══════════════════════════════════════════════
     PALETTE — one color per model, cycling
  ═══════════════════════════════════════════════ */
  const PALETTE = [
    0x4a9eca, 0xf4a261, 0x2ec4b6, 0xe9c46a,
    0x9b5de5, 0xf72585, 0x06d6a0, 0xffd166,
    0x118ab2, 0xef476f, 0x26c485, 0xff6b6b,
  ];
  let paletteIdx = 0;
  function nextColor() { return PALETTE[paletteIdx++ % PALETTE.length]; }

  /* ═══════════════════════════════════════════════
     DOM refs
  ═══════════════════════════════════════════════ */
  const container    = document.getElementById('canvas-container');
  const zoneListEl   = document.getElementById('zone-list');
  const modelListEl  = document.getElementById('model-list');
  const loadingEl    = document.getElementById('loading-overlay');
  const loadingText  = document.getElementById('loading-text');
  const loadingSub   = document.getElementById('loading-sub');
  const statModels   = document.getElementById('stat-models');
  const statTris     = document.getElementById('stat-tris');
  const zoneLabelEl  = document.getElementById('zone-label');

  /* ═══════════════════════════════════════════════
     THREE SETUP
  ═══════════════════════════════════════════════ */
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x0d1117);
  renderer.localClippingEnabled = true;
  container.appendChild(renderer.domElement);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100000);
  camera.position.set(500, 300, 800);

  scene.add(new THREE.AmbientLight(0xffffff, 0.45));
  const dir1 = new THREE.DirectionalLight(0xffffff, 0.85);
  dir1.position.set(1, 2, 3); scene.add(dir1);
  const dir2 = new THREE.DirectionalLight(0x88ccff, 0.35);
  dir2.position.set(-2, -1, -2); scene.add(dir2);

  // Grid helper (subtle)
  const grid = new THREE.GridHelper(5000, 50, 0x1e2d3d, 0x1e2d3d);
  scene.add(grid);

  /* ═══════════════════════════════════════════════
     STATE
  ═══════════════════════════════════════════════ */
  // zones: [{name, path, models:[{name, path, color, mesh|null, visible, status}]}]
  const zones = [];
  let activeZoneIdx = -1;

  // interaction
  let isDragging = false, prevX = 0, prevY = 0;
  let rotX = 0, rotY = 0, panX = 0, panY = 0, zoom = 1;
  let pinchDist0 = 0, pinchPanX0 = 0, pinchPanY0 = 0;
  let autoRotate = false;
  let wireframeOn = false;
  let baseDist = 800; // updated after fit
  let sceneGroup = new THREE.Group(); scene.add(sceneGroup);

  // clipping plane
  let clipActive = false;
  let clipAxis = 'y';
  const clipMode = 'slice';
  let clipT = 0.5;
  let clipWidth = 0.10;     // fracción del rango total (0..1)
  let clipBounds = { min: -500, max: 500 };
  const clipPlaneA = new THREE.Plane(new THREE.Vector3(0,  1, 0), 0);
  const clipPlaneB = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);

  function resize() {
    const w = container.clientWidth;
    const h = container.clientHeight;
    renderer.setSize(w, h, false);
    const effectiveH = clipActive ? Math.floor(h / 2) : h;
    camera.aspect = w / effectiveH;
    camera.updateProjectionMatrix();
    if (clipActive && typeof updateClipPlaneMeshTransform === 'function') updateClipPlaneMeshTransform();
  }
  resize();
  window.addEventListener('resize', resize);

  /* ═══════════════════════════════════════════════
     ZONES — read from URL or discover
  ═══════════════════════════════════════════════ */

  /**
   * Expected structure:
   *   ?zones=Zona+norte,Zona+sur   (comma-sep folder names)
   * OR just ?zone=Zona+norte        (single zone — backwards compat)
   * OR no param → load zones.json from root listing all zones
   *
   * Each folder must have models.json:
   *   { "models": ["Drawing7.stl", "Drawing8.stl"] }
   */

  async function init() {
    showLoading('Cargando configuración...');
    const params = new URLSearchParams(location.search);

    let zoneNames = [];

    if (params.has('zones')) {
      zoneNames = params.get('zones').split(',').map(s => s.trim()).filter(Boolean);
    } else if (params.has('zone')) {
      zoneNames = [params.get('zone').trim()];
    } else {
      // Try to load root zones.json: {"zones":["Zona norte","Zona sur"]}
      try {
        const r = await fetch('zones.json');
        if (!r.ok) throw new Error('no zones.json');
        const j = await r.json();
        zoneNames = j.zones || [];
      } catch {
        hideLoading();
        showError('No se encontró zones.json ni parámetros de zona en la URL.');
        return;
      }
    }

    if (!zoneNames.length) {
      hideLoading();
      showError('No hay zonas definidas.');
      return;
    }

    // Load each zone's models.json
    for (const name of zoneNames) {
      const path = name.endsWith('/') ? name : name + '/';
      try {
        const r = await fetch(path + 'models.json');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const j = await r.json();
        const modelNames = j.models || [];
        zones.push({
          name,
          path,
          models: modelNames.map(mn => ({
            name: mn,
            path: path + mn,
            color: nextColor(),
            mesh: null,
            visible: true,
            opacity: 1.0,
            status: 'pending',
          }))
        });
      } catch (e) {
        zones.push({ name, path, models: [], error: e.message });
      }
    }

    renderZoneList();
    // Hide zone section when there's only one zone — no need to show it
    if (zones.length <= 1) {
      document.querySelector('.sidebar-section').style.display = 'none';
      document.getElementById('zone-list').style.display = 'none';
    }
    // Load first zone by default
    if (zones.length > 0) {
      await loadZone(0);
    } else {
      hideLoading();
    }
  }

  /* ═══════════════════════════════════════════════
     ZONE UI
  ═══════════════════════════════════════════════ */
  function renderZoneList() {
    zoneListEl.innerHTML = '';
    zones.forEach((z, i) => {
      const el = document.createElement('div');
      el.className = 'zone-item' + (i === activeZoneIdx ? ' active' : '');
      const dot = document.createElement('div');
      dot.className = 'zone-dot';
      dot.style.background = z.error ? '#f87171' : '#00c2ff';
      el.appendChild(dot);
      const label = document.createElement('span');
      label.textContent = z.name;
      el.appendChild(label);
      el.addEventListener('click', () => loadZone(i));
      zoneListEl.appendChild(el);
    });
  }

  /* ═══════════════════════════════════════════════
     CLEAR SCENE — elimina todos los meshes y
     resetea el estado de los modelos de todas las zonas
  ═══════════════════════════════════════════════ */
  function clearScene() {
    zones.forEach(z => z.models.forEach(m => {
      if (m.mesh) {
        sceneGroup.remove(m.mesh);
        m.mesh.geometry.dispose();
        m.mesh.material.dispose();
        m.mesh = null;
      }
      m.status = 'pending';
      m.triCount = 0;
    }));
    updateStats();
  }

  /* ═══════════════════════════════════════════════
     LOAD ZONE — limpia la escena y carga solo
     los modelos de la zona seleccionada
  ═══════════════════════════════════════════════ */
  async function loadZone(idx) {
    if (idx === activeZoneIdx) return;
    activeZoneIdx = idx;
    const zone = zones[idx];
    zoneLabelEl.textContent = zone.name;

    clearScene();
    renderZoneList();
    renderModelList();

    if (!zone.models.length) { hideLoading(); return; }

    showLoading('Cargando zona: ' + zone.name, '0 / ' + zone.models.length + ' modelos');

    let loaded = 0;
    const promises = zone.models.map(async (model) => {
      model.status = 'loading';
      renderModelList();
      try {
        const buffer = await fetchSTL(model.path);
        const geo = parseSTL(buffer);
        const mat = new THREE.MeshPhongMaterial({
          color: model.color,
          specular: 0x111111,
          shininess: 25,
          side: THREE.DoubleSide,
          wireframe: wireframeOn,
          transparent: true,
          opacity: model.opacity !== undefined ? model.opacity : 1.0,
          clippingPlanes: clipActive ? [clipPlaneA, clipPlaneB] : [],
          clipShadows: true,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.visible = model.visible;
        sceneGroup.add(mesh);
        model.mesh = mesh;
        model.status = 'ok';
        model.triCount = geo.attributes.position.count / 3;
      } catch (e) {
        model.status = 'error';
        model.errorMsg = e.message;
      }
      loaded++;
      loadingSub.textContent = loaded + ' / ' + zone.models.length + ' modelos';
      renderModelList();
      updateStats();
    });

    await Promise.all(promises);

    // Reset group rotation before computing bounding box — otherwise Box3 is skewed
    sceneGroup.rotation.set(0, 0, 0);
    sceneGroup.updateMatrixWorld(true);

    panX = 0; panY = 0; rotX = 0; rotY = 0; zoom = 1;
    centerZoneAtOrigin(zone);
    fitCamera();
    if (clipActive) updateClipPlane();
    hideLoading();
    renderModelList();
  }

  /* ═══════════════════════════════════════════════
     CENTER — mueve todos los meshes de la zona para
     que su bounding box colectivo quede en el origen.
     Debe llamarse con sceneGroup.rotation en cero.
  ═══════════════════════════════════════════════ */
  function centerZoneAtOrigin(zone) {
    const box = new THREE.Box3();
    let hasAny = false;
    zone.models.forEach(m => {
      if (m.mesh) { box.expandByObject(m.mesh); hasAny = true; }
    });
    if (!hasAny) return;

    const center = new THREE.Vector3();
    box.getCenter(center);

    zone.models.forEach(m => {
      if (m.mesh) m.mesh.position.sub(center);
    });
  }

  /* ═══════════════════════════════════════════════
     MODEL LIST UI
  ═══════════════════════════════════════════════ */
  function renderModelList() {
    modelListEl.innerHTML = '';
    const zone = zones[activeZoneIdx];
    if (!zone || !zone.models.length) return;

    zone.models.forEach(model => {
        const el = document.createElement('div');
        el.className = 'model-item' +
          (model.visible ? ' visible' : '') +
          (model.status === 'loading' ? ' loading' : '') +
          (model.status === 'error' ? ' error' : '');

        // Checkbox
        const chk = document.createElement('div');
        chk.className = 'model-checkbox';
        el.appendChild(chk);

        // Color dot
        const dot = document.createElement('div');
        dot.className = 'model-color-dot';
        dot.style.background = '#' + model.color.toString(16).padStart(6, '0');
        el.appendChild(dot);

        // Name
        const name = document.createElement('div');
        name.className = 'model-name';
        name.textContent = model.name.replace('.stl', '');
        el.appendChild(name);

        // Status
        const status = document.createElement('div');
        status.className = 'model-status';
        if (model.status === 'loading') {
          const spin = document.createElement('div');
          spin.className = 'mini-spin';
          el.appendChild(spin);
        } else if (model.status === 'ok') {
          status.className += ' ok';
          status.textContent = '✓';
          el.appendChild(status);
        } else if (model.status === 'error') {
          status.className += ' err';
          status.textContent = '✕';
          status.title = model.errorMsg || '';
          el.appendChild(status);
        }

        // Toggle visibility on click (only on the main row, not slider)
        if (model.mesh) {
          el.addEventListener('click', (e) => {
            if (e.target.classList.contains('opacity-slider')) return;
            model.visible = !model.visible;
            model.mesh.visible = model.visible;
            updateStats();
            renderModelList();
          });
        }

        modelListEl.appendChild(el);

        // Opacity slider row — always rendered below, shown when visible
        if (model.mesh) {
          const opRow = document.createElement('div');
          opRow.className = 'model-opacity-row' + (model.visible ? ' show' : '');
          const slider = document.createElement('input');
          slider.type = 'range';
          slider.className = 'opacity-slider';
          slider.min = 5; slider.max = 100;
          slider.value = Math.round(model.opacity * 100);
          const valLbl = document.createElement('div');
          valLbl.className = 'opacity-val';
          valLbl.textContent = slider.value + '%';
          slider.addEventListener('input', () => {
            model.opacity = slider.value / 100;
            model.mesh.material.opacity = model.opacity;
            valLbl.textContent = slider.value + '%';
          });
          opRow.appendChild(slider);
          opRow.appendChild(valLbl);
          modelListEl.appendChild(opRow);
        }
      });
  }

  function updateStats() {
    let totalMeshes = 0, totalTris = 0;
    zones.forEach(z => z.models.forEach(m => {
      if (m.mesh && m.visible) {
        totalMeshes++;
        totalTris += (m.triCount || 0);
      }
    }));
    statModels.textContent = totalMeshes;
    statTris.textContent = totalTris > 1000
      ? (totalTris / 1000).toFixed(1) + 'k'
      : totalTris;
  }

  /* ═══════════════════════════════════════════════
     STL FETCH + PARSE
  ═══════════════════════════════════════════════ */
  async function fetchSTL(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.arrayBuffer();
  }

  function parseSTL(buffer) {
    const isBinary = (() => {
      if (buffer.byteLength < 84) return false;
      const v = new DataView(buffer);
      const triCount = v.getUint32(80, true);
      return buffer.byteLength === 84 + triCount * 50;
    })();

    const positions = [], normals = [];

    if (isBinary) {
      const view = new DataView(buffer, 84);
      const triCount = new DataView(buffer).getUint32(80, true);
      for (let i = 0; i < triCount; i++) {
        const o = i * 50;
        const nx = view.getFloat32(o, true);
        const ny = view.getFloat32(o + 4, true);
        const nz = view.getFloat32(o + 8, true);
        for (let v = 0; v < 3; v++) {
          const vo = o + 12 + v * 12;
          positions.push(view.getFloat32(vo, true), view.getFloat32(vo + 4, true), view.getFloat32(vo + 8, true));
          normals.push(nx, ny, nz);
        }
      }
    } else {
      const text = new TextDecoder().decode(buffer);
      let nx = 0, ny = 0, nz = 0;
      for (const line of text.split('\n')) {
        const t = line.trim();
        if (t.startsWith('facet normal')) {
          const p = t.split(/\s+/);
          nx = parseFloat(p[2]); ny = parseFloat(p[3]); nz = parseFloat(p[4]);
        } else if (t.startsWith('vertex')) {
          const p = t.split(/\s+/);
          positions.push(parseFloat(p[1]), parseFloat(p[2]), parseFloat(p[3]));
          normals.push(nx, ny, nz);
        }
      }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));

    // Rotate X −90° (CAD convention → Three.js Y-up)
    geo.applyMatrix4(new THREE.Matrix4().makeRotationX(THREE.MathUtils.degToRad(-90)));

    return geo;
  }

  /* ═══════════════════════════════════════════════
     FIT CAMERA to all visible meshes
  ═══════════════════════════════════════════════ */
  function fitCamera() {
    const box = new THREE.Box3();
    let hasAny = false;
    zones.forEach(z => z.models.forEach(m => {
      if (m.mesh) { box.expandByObject(m.mesh); hasAny = true; }
    }));
    if (!hasAny) return;

    const center = new THREE.Vector3();
    const size   = new THREE.Vector3();
    box.getCenter(center);
    box.getSize(size);

    const maxDim = Math.max(size.x, size.y, size.z);
    baseDist = maxDim * 1.8;

    // Update clip bounds from scene extents along active axis
    clipBounds = {
      x: { min: box.min.x, max: box.max.x },
      y: { min: box.min.y, max: box.max.y },
      z: { min: box.min.z, max: box.max.z },
    }[clipAxis];
    updateClipPlane();

    // Adjust grid
    grid.scale.setScalar(maxDim / 2500);
    grid.position.y = box.min.y;

    // Reset pan/rot/zoom
    rotX = 0; rotY = 0; panX = center.x; panY = center.y; zoom = 1;
    camera.position.set(
      center.x + baseDist * 0.6,
      center.y + baseDist * 0.4,
      center.z + baseDist
    );
    camera.lookAt(center);
  }

  /* ═══════════════════════════════════════════════
     LOADING / ERROR UI
  ═══════════════════════════════════════════════ */
  function showLoading(msg, sub) {
    loadingEl.classList.remove('hidden');
    loadingText.textContent = msg || '';
    loadingSub.textContent  = sub  || '';
  }
  function hideLoading() { loadingEl.classList.add('hidden'); }
  function showError(msg) {
    loadingEl.classList.remove('hidden');
    loadingText.textContent = '⚠ ' + msg;
    loadingSub.textContent = '';
    document.querySelector('.spinner').style.display = 'none';
  }

  /* ═══════════════════════════════════════════════
     CONTROLS
  ═══════════════════════════════════════════════ */
  function dist2(a, b) {
    return Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
  }

  container.addEventListener('touchstart', e => {
    e.preventDefault();
    autoRotate = false;
    sidebar.classList.remove('open');
    // In split mode, only interact via top half touches
    const touch0 = e.touches[0];
    const halfH = container.clientHeight / 2;
    if (clipActive && touch0 && touch0.clientY - container.getBoundingClientRect().top > halfH) return;
    if (e.touches.length === 1) {
      isDragging = true;
      prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      pinchDist0 = dist2(e.touches[0], e.touches[1]);
      pinchPanX0 = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      pinchPanY0 = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    }
  }, { passive: false });

  container.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      rotY += (e.touches[0].clientX - prevX) * 0.4;
      rotX += (e.touches[0].clientY - prevY) * 0.4;
      prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      const d = dist2(e.touches[0], e.touches[1]);
      zoom *= d / pinchDist0;
      zoom = Math.max(0.05, Math.min(20, zoom));
      pinchDist0 = d;
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      panX -= (cx - pinchPanX0) * (baseDist / zoom) * 0.002;
      panY += (cy - pinchPanY0) * (baseDist / zoom) * 0.002;
      pinchPanX0 = cx; pinchPanY0 = cy;
    }
  }, { passive: false });

  container.addEventListener('touchend', e => {
    if (e.touches.length === 0) isDragging = false;
  });

  container.addEventListener('mousedown', e => {
    // In split mode ignore clicks on bottom half
    if (clipActive) {
      const halfH = container.clientHeight / 2;
      if (e.clientY - container.getBoundingClientRect().top > halfH) return;
    }
    isDragging = true; autoRotate = false;
    prevX = e.clientX; prevY = e.clientY;
    sidebar.classList.remove('open');
  });
  container.addEventListener('mousemove', e => {
    if (!isDragging) return;
    rotY += (e.clientX - prevX) * 0.3;
    rotX += (e.clientY - prevY) * 0.3;
    prevX = e.clientX; prevY = e.clientY;
  });
  container.addEventListener('mouseup',    () => { isDragging = false; });
  container.addEventListener('mouseleave', () => { isDragging = false; });
  container.addEventListener('wheel', e => {
    e.preventDefault();
    zoom *= e.deltaY > 0 ? 0.9 : 1.1;
    zoom = Math.max(0.05, Math.min(20, zoom));
    autoRotate = false;
  }, { passive: false });

  /* Buttons */
  document.getElementById('btn-reset').addEventListener('click', () => {
    fitCamera(); autoRotate = false;
  });

  document.getElementById('btn-wireframe').addEventListener('click', () => {
    wireframeOn = !wireframeOn;
    zones.forEach(z => z.models.forEach(m => {
      if (m.mesh) m.mesh.material.wireframe = wireframeOn;
    }));
    document.getElementById('btn-wireframe').classList.toggle('active', wireframeOn);
  });

  document.getElementById('btn-autorotate').addEventListener('click', function() {
    autoRotate = !autoRotate;
    this.classList.toggle('active', autoRotate);
  });

  document.getElementById('btn-fit').addEventListener('click', fitCamera);

  document.getElementById('btn-show-all').addEventListener('click', () => {
    zones.forEach(z => z.models.forEach(m => {
      m.visible = true;
      if (m.mesh) m.mesh.visible = true;
    }));
    updateStats(); renderModelList();
  });

  document.getElementById('btn-hide-all').addEventListener('click', () => {
    zones.forEach(z => z.models.forEach(m => {
      m.visible = false;
      if (m.mesh) m.mesh.visible = false;
    }));
    updateStats(); renderModelList();
  });

  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
  });

  document.getElementById('btn-menu-toggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });

  /* ── CLIPPING PLANE ── */
  const clipPanel    = document.getElementById('clip-panel');
  const clipSlider   = document.getElementById('clip-slider');
  const clipPosLabel = document.getElementById('clip-pos-label');
  const labelTop     = document.getElementById('label-top');
  const labelBottom  = document.getElementById('label-bottom');

  // Visible clip plane mesh (shown in bottom viewport, semi-transparent)
  const clipPlaneMesh = (() => {
    const geo = new THREE.PlaneGeometry(1, 1);
    const mat = new THREE.MeshBasicMaterial({
      color: 0x00c2ff,
      transparent: true,
      opacity: 0.40,   // 60% transparencia = opacity 0.40
      side: THREE.DoubleSide,
      depthWrite: false,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.visible = false;
    scene.add(mesh);
    return mesh;
  })();

  // Plane border wireframe
  const clipPlaneEdge = (() => {
    const geo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(1, 1));
    const mat = new THREE.LineBasicMaterial({ color: 0x00c2ff, opacity: 0.8, transparent: true });
    const line = new THREE.LineSegments(geo, mat);
    line.visible = false;
    scene.add(line);
    return line;
  })();

  function updateClipPlaneMeshTransform() {
    if (!clipActive) return;
    const range = clipBounds.max - clipBounds.min;
    const pos   = clipBounds.min + clipT * range;

    // Compute a large enough plane size to cover the scene
    const box = new THREE.Box3();
    zones.forEach(z => z.models.forEach(m => { if (m.mesh) box.expandByObject(m.mesh); }));
    const size = new THREE.Vector3();
    if (!box.isEmpty()) box.getSize(size);
    const planeSize = Math.max(size.x, size.y, size.z, 200) * 2.5;

    // Position and orient the plane mesh
    const center = new THREE.Vector3();
    if (!box.isEmpty()) box.getCenter(center);

    if (clipAxis === 'y') {
      clipPlaneMesh.rotation.set(0, 0, 0);
      clipPlaneMesh.position.set(center.x, pos, center.z);
    } else if (clipAxis === 'x') {
      clipPlaneMesh.rotation.set(0, Math.PI / 2, 0);
      clipPlaneMesh.position.set(pos, center.y, center.z);
    } else { // z
      clipPlaneMesh.rotation.set(Math.PI / 2, 0, 0);
      clipPlaneMesh.position.set(center.x, center.y, pos);
    }
    clipPlaneMesh.scale.set(planeSize, planeSize, 1);

    clipPlaneEdge.rotation.copy(clipPlaneMesh.rotation);
    clipPlaneEdge.position.copy(clipPlaneMesh.position);
    clipPlaneEdge.scale.copy(clipPlaneMesh.scale);

    // Position label-bottom dynamically
    // (just keep it at 50% height + a bit below center)
    labelBottom.style.top = '';
    const ch = container.clientHeight;
    labelBottom.style.top = (ch / 2 + 8) + 'px';
  }

  function updateClipPlane() {
    const range = clipBounds.max - clipBounds.min;
    const pos   = clipBounds.min + clipT * range;
    const normals = {
      x: [new THREE.Vector3( 1,0,0), new THREE.Vector3(-1,0,0)],
      y: [new THREE.Vector3( 0,1,0), new THREE.Vector3( 0,-1,0)],
      z: [new THREE.Vector3( 0,0,1), new THREE.Vector3( 0,0,-1)],
    }[clipAxis];

    if (clipMode === 'slice') {
      const half = (clipWidth * range) / 2;
      clipPlaneA.normal.copy(normals[0]);
      clipPlaneA.constant = -(pos - half);
      clipPlaneB.normal.copy(normals[1]);
      clipPlaneB.constant =  (pos + half);
    } else {
      clipPlaneA.normal.copy(normals[1]);
      clipPlaneA.constant = pos;
      clipPlaneB.normal.copy(normals[0]);
      clipPlaneB.constant = 999999;
    }

    const planes = clipActive ? [clipPlaneA, clipPlaneB] : [];
    zones.forEach(z => z.models.forEach(m => {
      if (m.mesh) m.mesh.material.clippingPlanes = planes;
    }));

    if (clipActive) updateClipPlaneMeshTransform();
  }

  document.getElementById('btn-clip').addEventListener('click', function() {
    clipActive = !clipActive;
    this.classList.toggle('active', clipActive);
    clipPanel.classList.toggle('show', clipActive);
    document.body.classList.toggle('split-mode', clipActive);

    clipPlaneMesh.visible = clipActive;
    clipPlaneEdge.visible = clipActive;
    labelTop.style.display    = clipActive ? 'block' : 'none';
    labelBottom.style.display = clipActive ? 'block' : 'none';

    if (clipActive) {
      updateClipPlane();
    } else {
      zones.forEach(z => z.models.forEach(m => {
        if (m.mesh) m.mesh.material.clippingPlanes = [];
      }));
    }
    resize();
  });

  clipSlider.addEventListener('input', () => {
    clipT = clipSlider.value / 100;
    document.getElementById('clip-pos-label').textContent = clipSlider.value + '%';
    updateClipPlane();
  });

  document.getElementById('clip-width-slider').addEventListener('input', function() {
    clipWidth = this.value / 100;
    document.getElementById('clip-width-val').textContent = this.value + '%';
    updateClipPlane();
  });

  document.querySelectorAll('.clip-axis-btn[data-axis]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.clip-axis-btn[data-axis]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      clipAxis = btn.dataset.axis;
      const box = new THREE.Box3();
      zones.forEach(z => z.models.forEach(m => { if (m.mesh) box.expandByObject(m.mesh); }));
      if (!box.isEmpty()) {
        clipBounds = { x: {min:box.min.x,max:box.max.x}, y: {min:box.min.y,max:box.max.y}, z: {min:box.min.z,max:box.max.z} }[clipAxis];
      }
      updateClipPlane();
    });
  });



  /* ═══════════════════════════════════════════════
     RENDER LOOP — split-screen when clipActive
  ═══════════════════════════════════════════════ */
  function animate() {
    requestAnimationFrame(animate);
    if (autoRotate) rotY += 0.15;

    sceneGroup.rotation.x = THREE.MathUtils.degToRad(rotX);
    sceneGroup.rotation.y = THREE.MathUtils.degToRad(rotY);

    const d = baseDist / zoom;
    camera.position.set(panX + d * 0.6, panY + d * 0.4, d);
    camera.lookAt(panX, panY, 0);

    const W = container.clientWidth;
    const H = container.clientHeight;

    if (clipActive) {
      // ── Two-pass split: top half (with clipping) / bottom half (no clipping) ──
      const halfH = Math.floor(H / 2);
      renderer.setScissorTest(true);

      // ── TOP viewport: clipping active, plane mesh hidden ──
      clipPlaneMesh.visible = false;
      clipPlaneEdge.visible = false;
      zones.forEach(z => z.models.forEach(m => {
        if (m.mesh) m.mesh.material.clippingPlanes = [clipPlaneA, clipPlaneB];
      }));
      camera.aspect = W / halfH;
      camera.updateProjectionMatrix();
      renderer.setViewport(0, halfH, W, halfH);
      renderer.setScissor(0, halfH, W, halfH);
      renderer.render(scene, camera);

      // ── BOTTOM viewport: no clipping, plane mesh visible ──
      clipPlaneMesh.visible = true;
      clipPlaneEdge.visible = true;
      zones.forEach(z => z.models.forEach(m => {
        if (m.mesh) m.mesh.material.clippingPlanes = [];
      }));
      camera.aspect = W / halfH;
      camera.updateProjectionMatrix();
      renderer.setViewport(0, 0, W, halfH);
      renderer.setScissor(0, 0, W, halfH);
      renderer.render(scene, camera);

      renderer.setScissorTest(false);

      // Restore clipping planes state for next frame's top pass
      zones.forEach(z => z.models.forEach(m => {
        if (m.mesh) m.mesh.material.clippingPlanes = [clipPlaneA, clipPlaneB];
      }));
      clipPlaneMesh.visible = false;
      clipPlaneEdge.visible = false;

    } else {
      // ── Single viewport ──
      camera.aspect = W / H;
      camera.updateProjectionMatrix();
      renderer.setViewport(0, 0, W, H);
      renderer.render(scene, camera);
    }
  }
  animate();

  /* ═══════════════════════════════════════════════
     DEVICE DETECTION — compact sidebar on touch
  ═══════════════════════════════════════════════ */
  if (navigator.maxTouchPoints > 0 || window.matchMedia('(pointer: coarse)').matches) {
    document.body.classList.add('is-touch');
  }

  /* ═══════════════════════════════════════════════
     SERVICE WORKER
  ═══════════════════════════════════════════════ */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  /* ═══════════════════════════════════════════════
     START
  ═══════════════════════════════════════════════ */
  init();

})();
</script>
</body>
</html>
